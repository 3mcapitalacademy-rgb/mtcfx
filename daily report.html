<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTCFX - 每日收益日曆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066cc, #00c08b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888888;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        /* 控制面板 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 102, 204, 0.3);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-weight: 600;
            color: #00c08b;
            min-width: 40px;
        }

        .control-group input {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(0, 102, 204, 0.5);
            background: rgba(0, 102, 204, 0.1);
            color: #ffffff;
            font-size: 1em;
            width: 120px;
            cursor: pointer;
        }

        .control-group input:focus {
            outline: none;
            border-color: #0066cc;
            background: rgba(0, 102, 204, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 25px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066cc, #0052a3);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0052a3, #003d7a);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 192, 139, 0.15);
            color: #00c08b;
            border: 1px solid #00c08b;
        }

        .btn-secondary:hover {
            background: rgba(0, 192, 139, 0.25);
            transform: translateY(-2px);
        }

        /* 統計卡片 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            color: #888888;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-value.profit {
            color: #00dd44;
        }

        .stat-value.loss {
            color: #ff3333;
        }

        /* 日曆 */
        .calendar-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 12px;
            padding: 30px;
            overflow-x: auto;
        }

        .calendar-title {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #00c08b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: rgba(0, 102, 204, 0.2);
        }

        th {
            padding: 15px;
            text-align: center;
            font-weight: 700;
            color: #00c08b;
            border: 1px solid rgba(0, 102, 204, 0.3);
        }

        td {
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(0, 102, 204, 0.2);
            height: 80px;
            vertical-align: top;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        td:hover {
            background: rgba(0, 102, 204, 0.1);
            border-color: rgba(0, 102, 204, 0.5);
        }

        /* 灰色的其他月份日期 */
        .other-month {
            color: #444444;
        }

        .other-month .day-number {
            color: #444444;
        }

        /* 今天標記 */
        .today {
            border: 2px solid #00c08b;
            background: rgba(0, 192, 139, 0.1);
        }

        .day-number {
            font-weight: 700;
            color: #ffffff;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .day-profit {
            font-weight: 700;
            font-size: 1em;
            margin-top: 5px;
        }

        .day-profit.profit {
            color: #00dd44;
        }

        .day-profit.loss {
            color: #ff3333;
        }

        .day-profit.neutral {
            color: #888888;
        }

        /* 數據輸入提示 */
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #666666;
        }

        .no-data p {
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .no-data .hint {
            font-size: 0.95em;
            color: #555555;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
            }

            .control-group {
                width: 100%;
            }

            .control-group input {
                width: 100%;
            }

            .button-group {
                width: 100%;
            }

            button {
                flex: 1;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px 5px;
                height: 70px;
            }

            .day-number {
                font-size: 0.95em;
            }

            .day-profit {
                font-size: 0.85em;
            }
        }

        /* 工具提示 */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            border: 1px solid rgba(0, 102, 204, 0.5);
        }

        td:hover .tooltip {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.jpg" alt="MTCFX Logo" style="height: 80px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0, 102, 204, 0.3);">
            <h1>MTCFX 每日收益日曆</h1>
            <p class="subtitle">實時追蹤每月交易成果</p>
        </header>

        <!-- 控制面板 -->
        <div class="controls">
            <div class="control-group">
                <label>年份:</label>
                <input type="number" id="yearInput" min="2024" max="2099" value="2026">
            </div>
            <div class="control-group">
                <label>月份:</label>
                <input type="number" id="monthInput" min="1" max="12" value="5">
            </div>
            <div class="button-group">
                <button class="btn-secondary" onclick="goToToday()">📅 今天</button>
                <button class="btn-primary" onclick="loadCalendar()">🔄 更新日曆</button>
            </div>
        </div>

        <!-- 統計卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">本月盈利</div>
                <div class="stat-value profit" id="monthProfit">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本月虧損</div>
                <div class="stat-value loss" id="monthLoss">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本月淨利</div>
                <div class="stat-value" id="monthNet" style="color: #00c08b;">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">盈利天數</div>
                <div class="stat-value profit" id="profitDays">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">虧損天數</div>
                <div class="stat-value loss" id="lossDays">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">勝率</div>
                <div class="stat-value" id="winRate" style="color: #00c08b;">0%</div>
            </div>
        </div>

        <!-- 日曆 -->
        <div class="calendar-wrapper">
            <div class="calendar-title" id="calendarTitle">2026年 5月</div>
            <table id="calendar">
                <thead>
                    <tr>
                        <th>日</th>
                        <th>一</th>
                        <th>二</th>
                        <th>三</th>
                        <th>四</th>
                        <th>五</th>
                        <th>六</th>
                    </tr>
                </thead>
                <tbody id="calendarBody">
                    <!-- 日期將由 JavaScript 動態生成 -->
                </tbody>
            </table>
        </div>

        <!-- 風險提示 -->
        <div id="dataHint" style="text-align: center; margin-top: 30px; color: #ff6666; display: none;">
            <p style="font-size: 1.1em; margin-bottom: 15px;">⚠️ 風險提示：市場有風險，過往業績不預示未來結果。</p>
        </div>

        <!-- 版權信息 -->

            <p>© 2026 MTCFX . All rights reserved.</p>
        </div>
    </div>

        // 假期數據
        const holidayData = {
        };

        // 假期樣式 - 白色字體
        const holidayStyle = {
            color: '#ffffff',
            fontWeight: 'bold'
        };

        function loadCalendar() {
            const year = parseInt(document.getElementById('yearInput').value);
            const month = parseInt(document.getElementById('monthInput').value);

            // 驗證輸入
            if (year < 2024 || year > 2099 || month < 1 || month > 12) {
                alert('請輸入有效的年份 (2024-2099) 和月份 (1-12)');
                return;
            }

            generateCalendar(year, month);
        }

        function generateCalendar(year, month) {
            const calendarBody = document.getElementById('calendarBody');
            const calendarTitle = document.getElementById('calendarTitle');
            
            // 更新標題
            const monthNames = ['', '1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            calendarTitle.textContent = `${year}年 ${monthNames[month]}`;

            // 獲得月份第一天的星期
            const firstDay = new Date(year, month - 1, 1).getDay();
            // 獲得月份的天數
            const daysInMonth = new Date(year, month, 0).getDate();
            // 獲得上個月的天數
            const daysInPrevMonth = new Date(year, month - 1, 0).getDate();

            calendarBody.innerHTML = '';

            let dayCount = 1;
            let rows = 6;

            // 統計數據
            let totalProfit = 0;
            let totalLoss = 0;
            let profitDays = 0;
            let lossDays = 0;

            for (let week = 0; week < rows; week++) {
                const row = document.createElement('tr');

                for (let day = 0; day < 7; day++) {
                    const cell = document.createElement('td');
                    const currentDay = week * 7 + day;

                    if (currentDay < firstDay) {
                        // 上個月的日期
                        const prevDate = daysInPrevMonth - (firstDay - currentDay - 1);
                        cell.textContent = prevDate;
                        cell.classList.add('other-month');
                    } else if (dayCount > daysInMonth) {
                        // 下個月的日期
                        cell.textContent = dayCount - daysInMonth;
                        cell.classList.add('other-month');
                    } else {
                        // 本月日期
                        const dateStr = formatDate(year, month, dayCount);
                        const profit = dailyProfitData[dateStr] || 0;
                        const holiday = holidayData[dateStr];

                        // 構建日期單元格
                        const dayDiv = document.createElement('div');
                        dayDiv.className = 'day-number';
                        dayDiv.textContent = dayCount;

                        const profitDiv = document.createElement('div');
                        profitDiv.className = 'day-profit';

                        // 如果是假期，顯示假期標籤
                        if (holiday) {
                            profitDiv.classList.add('holiday');
                            profitDiv.textContent = holiday;
                            profitDiv.style.color = '#ffffff';
                            profitDiv.style.fontWeight = 'bold';
                        } else if (profit > 0) {
                            profitDiv.classList.add('profit');
                            profitDiv.textContent = `+$${profit.toFixed(2)}`;
                            totalProfit += profit;
                            profitDays++;
                        } else if (profit < 0) {
                            profitDiv.classList.add('loss');
                            profitDiv.textContent = `-$${Math.abs(profit).toFixed(2)}`;
                            totalLoss += Math.abs(profit);
                            lossDays++;
                        } else {
                            profitDiv.classList.add('neutral');
                            profitDiv.textContent = '$0.00';
                            profitDiv.style.color = '#888888';
                        }

                        cell.appendChild(dayDiv);
                        if (dailyProfitData[dateStr] !== undefined || holiday) {
                            cell.appendChild(profitDiv);
                        }

                        // 檢查今天
                        const today = new Date();
                        if (year === today.getFullYear() && month === today.getMonth() + 1 && dayCount === today.getDate()) {
                            cell.classList.add('today');
                        }

                        dayCount++;
                    }

                    row.appendChild(cell);
                }

                calendarBody.appendChild(row);

                // 如果已經到月底，停止添加行
                if (dayCount > daysInMonth) {
                    break;
                }
            }

            // 更新統計數據
            updateStats(totalProfit, totalLoss, profitDays, lossDays);
        }

        function formatDate(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function updateStats(totalProfit, totalLoss, profitDays, lossDays) {
            const netProfit = totalProfit - totalLoss;
            const totalDays = profitDays + lossDays;
            const winRate = totalDays > 0 ? ((profitDays / totalDays) * 100).toFixed(2) : 0;

            document.getElementById('monthProfit').textContent = `$${totalProfit.toFixed(2)}`;
            document.getElementById('monthProfit').style.color = '#00dd44';
            document.getElementById('monthLoss').textContent = `$${totalLoss.toFixed(2)}`;
            document.getElementById('monthLoss').style.color = '#ff3333';
            document.getElementById('monthNet').textContent = `$${netProfit.toFixed(2)}`;
            document.getElementById('monthNet').style.color = netProfit >= 0 ? '#00c08b' : '#ff3333';
            document.getElementById('profitDays').textContent = profitDays;
            document.getElementById('lossDays').textContent = lossDays;
            document.getElementById('winRate').textContent = `${winRate}%`;
        }

        function goToToday() {
            const today = new Date();
            document.getElementById('yearInput').value = today.getFullYear();
            document.getElementById('monthInput').value = today.getMonth() + 1;
            loadCalendar();
        }

        // 初始化日曆
        document.addEventListener('DOMContentLoaded', function() {
            loadCalendar();
            
            // 顯示數據提示
            setTimeout(() => {
                document.getElementById('dataHint').style.display = 'block';
            }, 2000);
        });

        // 回車鍵觸發更新
        document.getElementById('yearInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadCalendar();
        });
        document.getElementById('monthInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadCalendar();
        });
    </script>
</body>
</html>
